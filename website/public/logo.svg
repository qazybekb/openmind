<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Bear head shape -->
  <circle cx="60" cy="65" r="35" fill="#FDB515" opacity="0.9"/>
  <!-- Ears -->
  <circle cx="32" cy="38" r="14" fill="#FDB515" opacity="0.9"/>
  <circle cx="88" cy="38" r="14" fill="#FDB515" opacity="0.9"/>
  <circle cx="32" cy="38" r="8" fill="#E5A213" opacity="0.6"/>
  <circle cx="88" cy="38" r="8" fill="#E5A213" opacity="0.6"/>
  <!-- Face -->
  <circle cx="47" cy="58" r="4" fill="#09090b"/>
  <circle cx="73" cy="58" r="4" fill="#09090b"/>
  <ellipse cx="60" cy="72" rx="8" ry="6" fill="#E5A213" opacity="0.7"/>
  <circle cx="60" cy="70" r="3" fill="#09090b"/>
  <!-- Lightbulb glow above head — "open mind" -->
  <circle cx="60" cy="22" r="10" fill="#FDB515" opacity="0.3"/>
  <circle cx="60" cy="22" r="6" fill="#FDB515" opacity="0.5"/>
  <circle cx="60" cy="22" r="3" fill="#FDB515" opacity="0.9"/>
  <!-- Small rays -->
  <line x1="60" y1="8" x2="60" y2="4" stroke="#FDB515" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="48" y1="13" x2="45" y2="10" stroke="#FDB515" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="72" y1="13" x2="75" y2="10" stroke="#FDB515" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
</svg>
