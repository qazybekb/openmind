name: Bug report
description: Report a reproducible bug in OpenMind
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the exact commands, prompts, or setup needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Ask ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.9"
  - type: input
    id: openmind
    attributes:
      label: OpenMind version
      placeholder: "0.1.0"
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Include relevant logs, screenshots, or environment details. Do not paste tokens or secrets.
